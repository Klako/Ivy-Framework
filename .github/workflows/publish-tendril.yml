name: Publish Ivy.Tendril

permissions:
  contents: write
  id-token: write

on:
  push:
    tags: ['tendril/v*']
  workflow_dispatch:

jobs:
  publish-nuget-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.13

      - name: Setup Java (for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep -oP "(?<=<Version>)[^<]+" tendril/Directory.Build.props || echo "1.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack NuGet
        run: |
          VERSION_ARG=""
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            VERSION_ARG="/p:Version=${{ steps.version.outputs.version }}"
          fi
          dotnet pack tendril/Ivy.Tendril/Ivy.Tendril.csproj --configuration Release --output ./nupkg $VERSION_ARG

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: rorychatt-ivy

      - name: Clean NuGet output before signing
        run: |
          find ./nupkg -mindepth 1 -maxdepth 1 -not -name "*.nupkg" -exec rm -rf {} +
          mkdir -p ./nupkg_signed

      - name: Sign NuGet packages
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: src/nupkg
          output_path: src/nupkg_signed

      - name: Overwrite origin with signed nuget
        run: |
          cp -f ./nupkg_signed/*.nupkg ./nupkg/

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

#      - name: Publish NPM
#        if: steps.version.outputs.version != ''
#        run: |
#          cd tendril
#          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
#          npm publish --provenance --access public --ignore-scripts
#        env:
#          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: always()
        run: |
          echo "## 🎉 Ivy.Tendril Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            echo "### Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **NuGet**: [Ivy.Tendril](https://www.nuget.org/packages/Ivy.Tendril)" >> $GITHUB_STEP_SUMMARY
#          echo "✅ **NPM**: [@ivy/tendril](https://www.npmjs.com/package/@ivy/tendril)" >> $GITHUB_STEP_SUMMARY

  publish-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
    defaults:
      run:
        working-directory: src
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.13

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore

      - name: Install vpk tool and dependencies
        run: |
          dotnet tool install -g vpk
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y libfuse2
          fi

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP "(?<=<Version>)[^<]+" tendril/Directory.Build.props || echo "1.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set Icon Path
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "ICON_PATH=tendril/Ivy.Tendril/Assets/Tendril.ico" >> $GITHUB_ENV
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            echo "ICON_PATH=tendril/Ivy.Tendril/Assets/Tendril.icns" >> $GITHUB_ENV
          else
            echo "ICON_PATH=tendril/Ivy.Tendril/Assets/Tendril.png" >> $GITHUB_ENV
          fi

      - name: Publish Desktop Binary
        run: |
          dotnet publish tendril/Ivy.Tendril/Ivy.Tendril.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --output ./publish/desktop/${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:ReadyToRun=false \
            --self-contained true

      - name: Pack Installer (Velopack)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          EXE_NAME="Ivy.Tendril"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            EXE_NAME="Ivy.Tendril.exe"
          fi
          
          vpk pack \
            --packId IvyTendril \
            --packVersion ${{ steps.version.outputs.version }} \
            --packDir ./publish/desktop/${{ matrix.rid }} \
            --mainExe $EXE_NAME \
            --outputDir ./releases \
            --icon "$ICON_PATH" \
            $( [[ "${{ matrix.os }}" != "ubuntu-latest" ]] && echo "--noPortable" ) \
            --delta None \
            $( [[ "${{ matrix.rid }}" == osx-* ]] && echo "--bundleId com.ivy.tendril" )

      - name: Prepare Windows installer for signing
        if: startsWith(matrix.rid, 'win-')
        run: |
          mkdir -p unsigned_releases signed_releases
          find releases -maxdepth 1 -type f \( -name "*.exe" \) -exec cp {} unsigned_releases/ \;

      - name: Sign Windows installer
        if: startsWith(matrix.rid, 'win-')
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: src/unsigned_releases
          output_path: src/signed_releases

      - name: Overwrite origin with signed installer
        if: startsWith(matrix.rid, 'win-')
        run: |
          cp -f signed_releases/*.exe releases/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tendril-installer-${{ matrix.rid }}
          path: |
            src/releases/*.exe
            src/releases/*.pkg
            src/releases/*.AppImage
            src/releases/*.nupkg
            src/releases/RELEASES

  release:
    needs: [publish-nuget-npm, publish-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/tendril/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tendril-installer-*
          merge-multiple: true

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "Tendril $TAG_NAME" \
            --generate-notes \
            ./*

  deploy-docs:
    runs-on: ubuntu-latest
    environment: production
    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      APP_SERVICE_NAME: ${{ vars.TENDRIL_DOCS_SERVICE_NAME }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_NAME }}.azurecr.io
      IMAGE_NAME: ${{ vars.TENDRIL_DOCS_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 'Az login with OIDC'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: 'ACR Login'
        run: az acr login --name $ACR_NAME

      - name: 'Build and Push'
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            -f .github/docker/Dockerfile.tendril-docs .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: 'Deploy to Preproduction Slot'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          images: '${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          slot-name: 'preproduction'

      - name: 'Swap Preproduction with Production'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.APP_SERVICE_NAME }} \
              --slot preproduction \
              --target-slot production
