name: Publish Ivy.Tendril

permissions:
  contents: read
  id-token: write

on:
  push:
    tags: ['tendril/v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.2). Leave empty to use Directory.Build.props version.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java (for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Restore
        run: dotnet restore tendril/Ivy.Tendril/Ivy.Tendril.csproj

      - name: Build
        run: dotnet build tendril/Ivy.Tendril/Ivy.Tendril.csproj --configuration Release --no-restore

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/tendril/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/tendril/v}"
            echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          VERSION_ARG=""
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            VERSION_ARG="/p:Version=${{ steps.version.outputs.version }}"
          fi
          dotnet pack tendril/Ivy.Tendril/Ivy.Tendril.csproj --configuration Release --no-build --output ./nupkg $VERSION_ARG

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: nuget-auth
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-auth.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
