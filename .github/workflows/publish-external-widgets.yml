name: Publish External Widgets

permissions:
  contents: write
  id-token: write

on:
  push:
    tags: ['widgets/v*']
  workflow_dispatch:
    inputs:
      widget-name:
        description: 'Widget name to publish (e.g., Xterm, Leaflet) - leave empty to publish all changed widgets'
        required: false
        type: string

jobs:
  publish-widgets:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install vite-plus (vp)
        run: npm install -g vite-plus@0.1.13

      - name: Install PowerShell
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep -oP "(?<=<Version>)[^<]+" widgets/Directory.Build.props 2>/dev/null || echo "1.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine widgets to publish
        id: widgets
        run: |
          if [ -n "${{ inputs.widget-name }}" ]; then
            # Manual workflow dispatch with specific widget
            echo "widgets=Ivy.Widgets.${{ inputs.widget-name }}" >> "$GITHUB_OUTPUT"
          else
            # Tag-based trigger - publish all external widgets
            # In the future, this could be enhanced to detect changed widgets from git diff
            WIDGET_DIRS=$(find widgets -maxdepth 1 -type d -name "Ivy.Widgets.*" | xargs -n1 basename | tr '\n' ' ')
            echo "widgets=$WIDGET_DIRS" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and pack widgets
        run: |
          mkdir -p ./nupkg
          for widget in ${{ steps.widgets.outputs.widgets }}; do
            echo "Processing $widget..."
            WIDGET_PATH="widgets/$widget"

            if [ ! -d "$WIDGET_PATH" ]; then
              echo "Warning: Widget directory $WIDGET_PATH not found, skipping"
              continue
            fi

            # Build frontend if it exists
            if [ -d "$WIDGET_PATH/frontend" ]; then
              echo "Building frontend for $widget..."
              cd "$WIDGET_PATH/frontend"
              pnpm install
              pnpm run build
              cd ../../..
            fi

            # Pack NuGet package
            echo "Packing $widget..."
            VERSION_ARG=""
            if [ -n "${{ steps.version.outputs.version }}" ]; then
              VERSION_ARG="/p:Version=${{ steps.version.outputs.version }}"
            fi
            dotnet pack "$WIDGET_PATH/$widget.csproj" --configuration Release --output ./nupkg $VERSION_ARG
          done

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: rorychatt-ivy

      - name: Clean NuGet output before signing
        run: |
          find ./nupkg -mindepth 1 -maxdepth 1 -not -name "*.nupkg" -exec rm -rf {} +
          mkdir -p ./nupkg_signed

      - name: Sign NuGet packages
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: src/nupkg
          output_path: src/nupkg_signed

      - name: Overwrite origin with signed nuget
        run: |
          cp -f ./nupkg_signed/*.nupkg ./nupkg/

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish summary
        if: always()
        run: |
          echo "## 🎉 External Widgets Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            echo "### Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Widgets:" >> $GITHUB_STEP_SUMMARY
          for widget in ${{ steps.widgets.outputs.widgets }}; do
            echo "- ✅ [$widget](https://www.nuget.org/packages/$widget)" >> $GITHUB_STEP_SUMMARY
          done

  release:
    needs: publish-widgets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/widgets/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "External Widgets $TAG_NAME" \
            --generate-notes
