    allowedTools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - WebFetch
      - WebSearch
  ExpandPlan:
    model: sonnet
    allowedTools:
      - Read
      - Glob
      - Grep
      - Bash
      - Write
      - Edit
  MakePr:
    model: sonnet
    allowedTools:
      - Read
      - Glob
      - Grep
      - Bash
      - Write
      - Edit
  UpdatePlan:
    model: sonnet
    allowedTools:
      - Read
      - Glob
      - Grep
