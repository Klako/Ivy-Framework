name: Frontend Unit Tests
permissions:
  contents: read
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1

      - name: Install dependencies
        working-directory: ./src/frontend
        run: vp install

      - name: Run unit tests
        working-directory: ./src/frontend
        run: vp test
