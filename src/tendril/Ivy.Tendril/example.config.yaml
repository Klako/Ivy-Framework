# TENDRIL_HOME environment variable is required (points to this config directory)
# REPOS_HOME environment variable is optional (base path for relative repo paths)

agentCommand: claude
jobTimeout: 30
staleOutputTimeout: 10

# Variable Expansion Support:
# - %DotnetUserSecrets:Section:Key% - Read from .NET user secrets (requires .csproj with UserSecretsId)
# - %TENDRIL_HOME% - Expands to TENDRIL_HOME env var
# - %ANY_ENV_VAR% - Standard environment variable expansion (e.g., %REPOS_HOME%)
# See VARIABLE_EXPANSION.md for details

# Example with user secrets for sensitive data:
# llm:
#   endpoint: %DotnetUserSecrets:OpenAi:Endpoint%
#   apiKey: %DotnetUserSecrets:OpenAi:ApiKey%
#   model: gpt-4o-mini

projects: []
verifications: []

editor:
  command: code
  label: VS Code

telemetry: true

# Model pricing is now embedded in Assets/models.yaml and managed by ModelPricingService.
# No configuration needed — costs are calculated automatically when jobs complete.

# Example project configuration:
# projects:
