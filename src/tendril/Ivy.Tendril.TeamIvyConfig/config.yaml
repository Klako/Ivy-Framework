verifications:
- name: DotnetBuild
  prompt: Run `dotnet build --warnaserror` in the project repo and verify it succeeds with zero errors and zero warnings.
- name: DotnetTest
  prompt: >
    Run dotnet tests in the project repo.
    1. Read the plan revision's **## Tests** section for test scope instructions.
    2. If the plan specifies a `dotnet test --filter` expression, run:
       `dotnet test --filter "<filter from plan>"`
       Common filter examples:
       - By class: `dotnet test --filter "FullyQualifiedName~MyTestClass"`
       - By namespace: `dotnet test --filter "Namespace~MyNamespace"`
       - Multiple: `dotnet test --filter "FullyQualifiedName~TestA|FullyQualifiedName~TestB"`
    3. If the plan says "No existing test coverage" or "No dotnet tests needed", skip with Pass.
    4. If the plan says "Run all tests (broad cross-cutting change)", run `dotnet test` (all tests).
    5. If the plan does NOT specify any test scope at all, FAIL the verification with message:
       "No test filter specified in plan. Plans must specify a dotnet test --filter expression in the ## Tests section."
    6. Verify all executed tests pass.
- name: DotnetFormat
  prompt: Run `dotnet format` in the project repo, scoped to only the files changed by this plan's commits. Get the list of changed .cs files with `git diff --name-only --diff-filter=ACM HEAD~<N> -- '*.cs'` (where N is the number of commits in this execution), then run `dotnet format --include <files>`. If it modifies any files, stage and commit them. If no .cs files were changed, skip this verification.
- name: FrontendLint
  prompt: Run `cd src/frontend && npm run lint && npm run format:check` and verify no errors.
- name: IvyFrameworkVerification
  prompt: 'Run the IvyFrameworkVerification promptware to visually verify UI changes. Execute: `pwsh -NoProfile -File "$TENDRIL_HOME/Promptwares/IvyFrameworkVerification/IvyFrameworkVerification.ps1" -PlanPath "<PlanFolder>"`. Creates a temp project with demo apps, runs Playwright tests, and copies artifacts to <PlanFolder>/artifacts/. Write the verification report to <PlanFolder>/verification/IvyFrameworkVerification.md.'
- name: CheckResult
  prompt: >
    Verify the implementation matches what was requested in the plan.
    1. Read the plan revision from `<PlanFolder>/revisions/` (latest numbered .md file)
    2. Read all commits made by this execution from `plan.yaml` `commits` list
    3. For each commit, review the diff (`git show <hash>`) in the worktree
    4. Compare the plan's **Problem** and **Solution** sections against the actual changes:
       - Are all described changes present?
       - Are there unexpected/unrelated changes?
       - Do the changes solve the stated problem?
    5. If the plan has a **Tests** section, verify those tests were actually written
    6. Write the verification report to `<PlanFolder>/verification/CheckResult.md`
    Report format:
    ```
    # CheckResult

    - **Date:** <CurrentTime>
    - **Result:** Pass / Fail
    - **Attempts:** 1

    ## Requested vs Delivered
    | Requirement | Status | Notes |
    |-------------|--------|-------|
    | <from plan> | Done / Missing / Partial | <details> |

    ## Unexpected Changes

    <list any changes not described in the plan, or "None">

    ## Output

    <summary assessment>

    ## Fixes Applied

    None

    ## Issues Found

    <any gaps between plan and implementation, or "None">
    ```
- name: NewWidgetChecklist
  prompt: >
    Verify all 6 required elements exist for any new widget created by this plan:
    1. Backend widget class — src/Ivy/Widgets/<WidgetName>.cs with [Prop]/[Event] attributes, [JsonIgnore] on delegates, Has* booleans
    2. Frontend React component — src/frontend/src/widgets/<widgetName>/<WidgetName>Widget.tsx
    3. Index export — src/frontend/src/widgets/<widgetName>/index.ts
    4. Widget map registration — import + entry in src/frontend/src/widgets/widgetMap.ts
    5. Sample app — src/Ivy.Samples.Shared/Apps/Widgets/<WidgetName>App.cs
    6. Documentation page — src/Ivy.Docs.Shared/Docs/02_Widgets/<category>/<WidgetName>.md
    Check each file exists and follows conventions. Report which elements are present vs missing.
planTemplate: >
  # {title}

  ## Problem

  ## Solution

  ## Tests

  **New tests:**

  (specify tests to write for new functionality, or "None" if no new tests needed)

  **Test scope (dotnet test --filter):**

  `FullyQualifiedName~Namespace.SpecificTestClass` (or "No existing test coverage" / "Run all tests — <justification>")

  ## Verification
