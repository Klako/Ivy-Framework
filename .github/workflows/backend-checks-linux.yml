name: Backend Checks (Linux)
permissions:
  contents: read
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  backend-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm64]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      # Install required packages
      - name: Install required packages
        run: sudo apt-get update && sudo apt-get install -y attr

      # Setup Node.js (needed for integrated frontend build in dotnet build)
      - uses: voidzero-dev/setup-vp@v1

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Update workloads
      - name: Update .NET workloads
        run: dotnet workload update

      # Restore packages
      - name: Restore packages
        run: dotnet restore

      # Check code formatting
      - name: Check code formatting
        run: dotnet format --verify-no-changes

      # Build solution
      - name: Build solution
        run: dotnet build --configuration Release

      # Run tests
      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
